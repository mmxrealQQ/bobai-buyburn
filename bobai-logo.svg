<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0B90B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCD535;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circuit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0B90B;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#F0B90B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#F0B90B;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)" />

  <!-- Circuit lines (AI aesthetic) -->
  <g stroke="url(#circuit)" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="40" y1="128" x2="140" y2="128" />
    <line x1="140" y1="128" x2="160" y2="148" />
    <line x1="160" y1="148" x2="160" y2="200" />
    <circle cx="160" cy="200" r="3" fill="#F0B90B" />

    <line x1="472" y1="180" x2="380" y2="180" />
    <line x1="380" y1="180" x2="360" y2="200" />
    <line x1="360" y1="200" x2="360" y2="240" />
    <circle cx="360" cy="240" r="3" fill="#F0B90B" />

    <line x1="80" y1="400" x2="150" y2="400" />
    <line x1="150" y1="400" x2="170" y2="380" />
    <line x1="170" y1="380" x2="170" y2="340" />
    <circle cx="170" cy="340" r="3" fill="#F0B90B" />

    <line x1="432" y1="370" x2="370" y2="370" />
    <line x1="370" y1="370" x2="350" y2="350" />
    <line x1="350" y1="350" x2="350" y2="310" />
    <circle cx="350" cy="310" r="3" fill="#F0B90B" />
  </g>

  <!-- BNB Diamond shape (center, stylized) -->
  <g transform="translate(256, 220)" filter="url(#glow)">
    <polygon points="0,-70 60,-20 0,30 -60,-20" fill="none" stroke="url(#gold)" stroke-width="3" />
    <polygon points="0,-50 40,-15 0,15 -40,-15" fill="url(#gold)" opacity="0.2" />
    <polygon points="0,-35 25,-10 0,10 -25,-10" fill="url(#gold)" opacity="0.4" />
  </g>

  <!-- AI "brain" nodes around diamond -->
  <g filter="url(#glow)">
    <circle cx="256" cy="130" r="5" fill="#F0B90B" />
    <circle cx="196" cy="170" r="4" fill="#F0B90B" opacity="0.7" />
    <circle cx="316" cy="170" r="4" fill="#F0B90B" opacity="0.7" />
    <circle cx="196" cy="250" r="4" fill="#F0B90B" opacity="0.7" />
    <circle cx="316" cy="250" r="4" fill="#F0B90B" opacity="0.7" />
    <line x1="256" y1="130" x2="196" y2="170" stroke="#F0B90B" stroke-width="1" opacity="0.5" />
    <line x1="256" y1="130" x2="316" y2="170" stroke="#F0B90B" stroke-width="1" opacity="0.5" />
    <line x1="196" y1="170" x2="196" y2="250" stroke="#F0B90B" stroke-width="1" opacity="0.5" />
    <line x1="316" y1="170" x2="316" y2="250" stroke="#F0B90B" stroke-width="1" opacity="0.5" />
  </g>

  <!-- BOB text -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="url(#gold)" filter="url(#glow)">BOB</text>

  <!-- AI BUILDER subtitle -->
  <text x="256" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#F0B90B" letter-spacing="8" opacity="0.9">AI BUILDER</text>

  <!-- Tagline -->
  <text x="256" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F0B90B" opacity="0.6" letter-spacing="3">BUILD ON BNB</text>

  <!-- Opus 4.6 signature -->
  <text x="256" y="460" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#F0B90B" opacity="0.35">generated by opus 4.6</text>
</svg>

name: Worldcup Donation Bot (BNB/USDT → BOBAI)

on:
  workflow_dispatch: # Manual trigger + worker-wc cron dispatch

permissions:
  contents: read

jobs:
  swap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install viem

      - name: Run Worldcup Bot
        env:
          PRIZE_PRIVATE_KEY: ${{ secrets.PRIZE_PRIVATE_KEY }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL }}
          SUPABASE_URL: ${{ secrets.WC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.WC_SUPABASE_SERVICE_ROLE_KEY }}
        run: node worldcup-bot.js

name: BOB Auto Buy & Burn

on:
  workflow_dispatch: # Triggered by Cloudflare Worker cron (every 10 min) — no schedule here to prevent double runs

permissions:
  contents: write

jobs:
  buyback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install viem @four-meme/four-meme-ai@latest --ignore-scripts

      - name: Run Buy & Burn
        env:
          PRIVATE_KEY: ${{ secrets.BUYBACK_PRIVATE_KEY }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL }}
          SUPABASE_URL: ${{ secrets.WC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.WC_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node buyback-bot.js

      - name: Commit burn log
        run: |
          git config user.name "BOBAI Bot"
          git config user.email "bot@bobai.buildonbnbgame.xyz"
          cp burns.json /tmp/burns.json
          [ -f liq-boost-log.json ] && cp liq-boost-log.json /tmp/liq-boost-log.json
          [ -f bobai-liq-log.json ] && cp bobai-liq-log.json /tmp/bobai-liq-log.json
          for i in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/burns.json burns.json
            [ -f /tmp/liq-boost-log.json ] && cp /tmp/liq-boost-log.json liq-boost-log.json
            [ -f /tmp/bobai-liq-log.json ] && cp /tmp/bobai-liq-log.json bobai-liq-log.json
            git add burns.json
            [ -f liq-boost-log.json ] && git add liq-boost-log.json
            [ -f bobai-liq-log.json ] && git add bobai-liq-log.json
            true
            git diff --cached --quiet && break
            git commit -m "Burn log update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main && break || sleep 5
          done

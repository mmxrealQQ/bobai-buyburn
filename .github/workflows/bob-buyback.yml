name: BOB Auto Buy & Burn

on:
  schedule:
    # Run every 10 minutes (more reliable than 30 on GitHub Actions)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  buyback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install viem @four-meme/four-meme-ai@latest

      - name: Run Buy & Burn
        env:
          PRIVATE_KEY: ${{ secrets.BUYBACK_PRIVATE_KEY }}
          BSC_RPC_URL: ${{ secrets.BSC_RPC_URL }}
        run: |
          node buyback-bot.js

      - name: Commit burn log
        run: |
          git config user.name "BOBAI Bot"
          git config user.email "bot@bobai.buildonbnbgame.xyz"
          git fetch origin main
          git reset --soft origin/main
          git add burns.json liq-boost-log.json
          git diff --cached --quiet || git commit -m "Burn log update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main

<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Auth gate — hide page + redirect anonymous visitors before first paint -->
  <style>html.wc-gate{visibility:hidden!important}</style>
  <script>
    (function(){
      document.documentElement.classList.add('wc-gate');
      function hasSession(){
        try {
          return Object.keys(localStorage).some(function(k){
            return k.indexOf('sb-')===0 && k.lastIndexOf('-auth-token')===k.length-11 && !!localStorage.getItem(k);
          });
        } catch(e){ return true; }
      }
      if (!hasSession()){ window.location.replace('/worldcup/'); return; }
      document.documentElement.classList.remove('wc-gate');
      window.addEventListener('pageshow', function(e){
        if (e.persisted && !hasSession()) window.location.replace('/worldcup/');
      });
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOBAI Worldcup '26 — Leaderboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png?v=4">
  <link rel="stylesheet" href="./assets/style.css?v=17">
  <style>
    .container.wide{max-width:920px}

    /* TABS */
    .lbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;background:rgba(0,0,0,.3);padding:5px;border-radius:10px}
    .lbar button{flex:1;min-width:80px;padding:9px 8px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--muted);border-radius:7px;cursor:pointer;transition:all .15s;font-family:inherit}
    .lbar button.active{background:var(--gold-glow);color:var(--gold)}

    /* WALLET FILTER (skip+promote payout view toggle) */
    .wallet-filter{display:flex;gap:5px;flex-wrap:wrap;margin:-4px 0 14px}
    .wallet-filter button{padding:6px 11px;font-size:11px;font-weight:600;border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--muted);border-radius:7px;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:.3px}
    .wallet-filter button:hover{border-color:rgba(240,185,11,.3)}
    .wallet-filter button.active{background:var(--gold-glow);color:var(--gold);border-color:var(--gold)}

    /* GROUP/COIN SELECTOR */
    .sub-selector{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .sub-selector button{padding:7px 12px;font-size:11px;font-weight:600;border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--muted);border-radius:7px;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px}
    .sub-selector button:hover{border-color:rgba(240,185,11,.3)}
    .sub-selector button.active{background:var(--gold-glow);color:var(--gold);border-color:var(--gold)}
    .sub-selector button .coin-ic{width:16px;height:16px;border-radius:50%;object-fit:cover;display:inline-block;vertical-align:middle;overflow:hidden}
    .coin-badge{width:18px;height:18px;border-radius:50%;object-fit:cover;display:inline-block;vertical-align:-4px;margin-right:6px;overflow:hidden}
    .coin-ic.bobai,.coin-badge.bobai{transform:scale(1.08)} /* match BTC/BNB optical size — see crypto.html note */

    /* LIST */
    .list{display:flex;flex-direction:column;gap:6px}
    .list.scroll-cap{max-height:600px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(240,185,11,.3) transparent}
    .list.scroll-cap::-webkit-scrollbar{width:6px}
    .list.scroll-cap::-webkit-scrollbar-thumb{background:rgba(240,185,11,.25);border-radius:3px}
    .row{display:grid;grid-template-columns:38px 30px 1fr minmax(82px,108px) auto;gap:10px;align-items:center;padding:12px 14px;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;transition:all .15s}
    .row.me{border-color:var(--gold);background:rgba(240,185,11,.07)}
    .row.top1{background:linear-gradient(90deg,rgba(240,185,11,.15),rgba(0,0,0,.25));border-color:rgba(240,185,11,.4)}
    .row.top2{background:linear-gradient(90deg,rgba(192,192,192,.08),rgba(0,0,0,.25));border-color:rgba(192,192,192,.25)}
    .row.top3{background:linear-gradient(90deg,rgba(205,127,50,.08),rgba(0,0,0,.25));border-color:rgba(205,127,50,.25)}
    .row.closest{background:linear-gradient(90deg,rgba(240,185,11,.18),rgba(240,185,11,.06));border-color:var(--gold);box-shadow:0 0 24px rgba(240,185,11,.12)}

    .rank{font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--muted);text-align:center}
    .row.top1 .rank{color:var(--gold);font-size:18px}
    .row.top2 .rank{color:#cccccc;font-size:16px}
    .row.top3 .rank{color:#cd7f32;font-size:16px}
    .row.closest .rank{color:var(--gold);font-size:18px}
    .ava-sm{display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1}
    .uinfo{min-width:0}
    .uname{font-weight:600;color:var(--text);font-size:14px;display:flex;align-items:center;gap:4px;min-width:0}
    .uname .uname-text{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .uname .ball{font-size:13px;flex-shrink:0}
    .umeta{font-size:11px;color:var(--muted)}
    .pts{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--gold);white-space:nowrap;text-align:right}
    .pts .lbl{font-size:9.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-left:4px;font-weight:500}
    .pts.diff{font-size:14px;color:var(--text)}

    /* Prize cell — between username and pts */
    .prize-cell{text-align:right;font-family:'Space Grotesk';line-height:1.1;min-width:0}
    .prize-cell .pz-pct{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.3px}
    .prize-cell .pz-bobai{font-size:10.5px;color:var(--text);font-weight:600;margin-top:1px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .prize-cell .pz-usd{font-size:10px;color:var(--muted);font-weight:500;margin-top:1px}
    .prize-cell.zero .pz-pct{color:var(--muted);font-weight:600}
    .prize-cell.zero .pz-bobai,.prize-cell.zero .pz-usd{color:rgba(123,125,158,.55)}

    /* Rank gap (between top-N and "your row") */
    .rank-gap{text-align:center;color:var(--muted);padding:6px;letter-spacing:6px;font-weight:700;opacity:.5}

    /* "Your rank" footer */
    .me-footer{margin-top:14px;padding:12px 16px;background:linear-gradient(90deg,rgba(240,185,11,.08),rgba(240,185,11,.02));border:1px solid rgba(240,185,11,.3);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:12.5px}
    .me-footer .mf-left{display:flex;align-items:center;gap:10px;color:var(--text)}
    .me-footer .mf-rank{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--gold)}
    .me-footer .mf-status{color:var(--muted)}
    .me-footer .mf-status.qualified{color:#5fffa0;font-weight:600}
    .me-footer .mf-status.need{color:#ffc066;font-weight:600}

    /* Bracket-as-list (one phase shown at a time) */
    .br-list{display:flex;flex-direction:column;gap:8px}
    .br-list .br-match{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:12px 16px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px}
    .br-list .br-match.played{border-color:rgba(240,185,11,.25)}
    .br-list .br-match.final{border-color:var(--gold);background:rgba(240,185,11,.06)}
    .br-list .br-team{display:flex;align-items:center;gap:8px;min-width:0}
    .br-list .br-team.away{justify-content:flex-end}
    .br-list .br-team .fl{font-size:20px;flex-shrink:0}
    .br-list .br-team .nm{color:var(--text);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .br-list .br-team.tbd .nm{color:var(--muted)}
    .br-list .br-team.win .nm{font-weight:700;color:var(--gold)}
    .br-list .br-center{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:64px}
    .br-list .br-score{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:var(--text)}
    .br-list .br-score.played{color:var(--gold)}
    .br-list .br-vs{font-size:11px;color:var(--muted);letter-spacing:1px}
    .br-list .br-time{font-size:10px;color:var(--muted);margin-top:2px}

    /* Crypto stack — closest in middle */
    .crypto-divider{display:flex;align-items:center;gap:10px;margin:8px 0;color:var(--muted);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
    .crypto-divider::before,.crypto-divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .crypto-divider.up{color:#5fffa0}
    .crypto-divider.up::before,.crypto-divider.up::after{background:rgba(0,230,118,.2)}
    .crypto-divider.down{color:#ff8580}
    .crypto-divider.down::before,.crypto-divider.down::after{background:rgba(255,80,80,.2)}

    .empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;background:rgba(0,0,0,.2);border:1px dashed var(--border);border-radius:10px}

    /* FIFA STANDINGS TABLE */
    .section-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:18px 4px 8px;font-family:'Space Grotesk';font-weight:600;font-size:11.5px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
    .section-h .right{color:var(--muted);font-weight:500;letter-spacing:.5px;text-transform:none;font-size:11px}
    .standings{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px}
    .standings table{width:100%;border-collapse:collapse;font-size:13px}
    .standings th,.standings td{padding:9px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
    .standings th{font-family:'Space Grotesk';font-weight:600;font-size:10.5px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;background:rgba(0,0,0,.4)}
    .standings tbody tr:last-child td{border-bottom:none}
    .standings .team-cell{text-align:left;padding-left:10px;display:flex;align-items:center;gap:8px;min-width:0}
    .standings .team-cell .fl{font-size:18px;line-height:1;flex-shrink:0}
    .standings .team-cell .nm{color:var(--text);font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .standings .pos{font-weight:700;color:var(--muted);width:24px}
    .standings .pts{color:var(--gold);font-weight:700;font-family:'Space Grotesk'}
    .standings .gd-pos{color:#5fffa0}
    .standings .gd-neg{color:#ff7a7a}
    .standings tr.q1,.standings tr.q2{background:rgba(240,185,11,.04)}
    .standings tr.q1 .pos,.standings tr.q2 .pos{color:var(--gold)}
    .standings tr.q3{background:rgba(123,125,158,.04)}
    .standings .q-note{font-size:10px;color:var(--muted);padding:8px 12px;background:rgba(0,0,0,.4);text-align:left;border-top:1px solid rgba(255,255,255,.04)}

    /* KO BRACKET */
    .bracket-wrap{overflow-x:auto;padding:6px 2px 12px;-webkit-overflow-scrolling:touch}
    .bracket{display:flex;gap:14px;min-width:max-content}
    .br-col{display:flex;flex-direction:column;gap:10px;min-width:170px}
    .br-col-h{font-family:'Space Grotesk';font-weight:600;font-size:11px;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;text-align:center;padding-bottom:4px;border-bottom:1px solid var(--border)}
    .br-match{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:11.5px;line-height:1.4;flex:1;display:flex;flex-direction:column;justify-content:center;min-height:62px}
    .br-match.played{border-color:rgba(240,185,11,.25)}
    .br-match.final{border-color:var(--gold);background:rgba(240,185,11,.06)}
    .br-team{display:flex;align-items:center;gap:6px;min-width:0}
    .br-team .fl{font-size:14px;flex-shrink:0}
    .br-team .nm{flex:1;min-width:0;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .br-team.tbd .nm{color:var(--muted)}
    .br-team.win .nm{font-weight:700;color:var(--gold)}
    .br-team .sc{font-family:'Space Grotesk';font-weight:700;color:var(--text);font-size:12.5px;min-width:14px;text-align:right}
    .br-team.win .sc{color:var(--gold)}
    .br-meta{font-size:9.5px;color:var(--muted);letter-spacing:.4px;margin-top:5px;text-align:right}

    @media (max-width: 560px){
      .row{grid-template-columns:28px 26px 1fr minmax(70px,84px) auto;gap:7px;padding:10px 10px}
      .uname{font-size:13px}
      .pts{font-size:15px}
      .prize-cell .pz-pct{font-size:12px}
      .prize-cell .pz-bobai{font-size:9.5px}
      .prize-cell .pz-usd{font-size:9px}
      .standings th,.standings td{padding:7px 4px;font-size:12px}
      .standings .team-cell .nm{font-size:11.5px}
      .standings .team-cell{padding-left:6px;gap:5px}
      .standings .team-cell .fl{font-size:15px}
      .br-col{min-width:150px}
      .br-list .br-match{grid-template-columns:1fr auto 1fr;padding:10px 12px;gap:8px}
      .br-list .br-team .nm{font-size:12px}
      .br-list .br-center{min-width:54px}
      .br-list .br-score{font-size:16px}
      .me-footer{padding:10px 12px;font-size:12px}
      .me-footer .mf-rank{font-size:16px}
    }
  </style>
</head>

    <main>

          <div data-card-accent="pool-trophy"></div>
          <h1><span class="accent">Leaderboard</span></h1>
          <p class="sub">Live shares update with the <a href="./prize-pool.html" style="color:var(--gold)">prize pool</a> · ⚽ = wallet linked · only wallet-linked players are eligible for payouts (next eligible player takes the slot)</p>

          <!-- WALLET FILTER (toggles between full leaderboard and the exact payout ranking) -->
          <div class="wallet-filter" id="wallet-filter">
            <button data-filter="all" class="active">All players</button>

          <!-- TABS -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./assets/config.js?v=11"></script>
  <script src="./assets/countries.js?v=11"></script>
  <script src="./assets/auth.js?v=13"></script>
  <script src="./assets/profile.js?v=13"></script>
  <script src="./assets/avatar.js?v=7"></script>
  <script src="./assets/nav.js?v=3"></script>
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
  <script src="./assets/twemojify.js?v=2"></script>
  <script>
    const $ = (s,r=document)=>r.querySelector(s);
    const $$ = (s,r=document)=>[...r.querySelectorAll(s)];

    // ============== CONSTANTS ==============
    const POOL_SPLIT = {
      groupTop1:  0.55,  // 1st-of-each-group bracket (split flat across GROUP_SLOTS_TOP1=12)
      groupTop2:  0.30,  // 2nd-of-each-group bracket (split flat across GROUP_SLOTS_TOP2=12)
      groupBest3: 0.15,  // 8 best 3rd-placed players (split flat across GROUP_SLOTS_BEST3=8)
      // End-pool: fixed tiered weights for top 4 overall
      endTiers: [0.50, 0.25, 0.15, 0.10],
    };
    // Fixed slot counts — per-player share is always (fraction * group_pot) / slots,
    // regardless of how many slots are actually filled at projection time. This matches
    // the published rules (Group 1st × 12 → 55 %/12 ≈ 4.58 % etc.) and avoids inflating
    // a single early leader to look like they'd win the whole bracket.
    const GROUP_SLOTS_TOP1  = 12;
    const GROUP_SLOTS_TOP2  = 12;
    const GROUP_SLOTS_BEST3 = 8;
    const END_TOP_N = POOL_SPLIT.endTiers.length;
    const GROUP_LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    const COINS = [
      { code:'btc',   label:'BTC',   icon:'./illus/coin-btc.webp' },
      { code:'bnb',   label:'BNB',   icon:'./illus/coin-bnb.webp' },
      { code:'bobai', label:'BOBAI', icon:'./illus/coin-bobai.webp' },
    ];
    const KO_PHASES = [
      { key:'r32',   label:'Round of 32' },
      { key:'r16',   label:'Round of 16' },
      { key:'qf',    label:'Quarter-finals' },
      { key:'sf',    label:'Semi-finals' },
      { key:'3rd',   label:'Third place' },
      { key:'final', label:'Final' },
    ];

    // ============== STATE ==============
    let me = null;
    let view = 'overall';
    let subView = null;
    let allMatches = null;
    let pool = { total:0, group:0, end:0, crypto:0, price:0 };
    let allGroupData = null;
    let livePrices = { btc:null, bnb:null, bobai:null };
    // walletOnly: when true, non-linked players are hidden across every view (Overall, Groups,
    // Bracket projection, Crypto) and ranks re-number against the linked-only set — this is
    // the literal payout ranking the admin uses at settlement. Default OFF so the leaderboard
    // still shows bragging-rights positions for non-linked players. Persisted in localStorage.
    let walletOnly = false;
    try { walletOnly = localStorage.getItem('wc_wallet_filter') === '1'; } catch(e){}
    function isEligible(r){ return !!(r && r.has_wallet); }
    function applyWalletFilter(rows){ return walletOnly ? rows.filter(isEligible) : rows; }

    // ============== FORMATTERS ==============
    function countryFlag(code){ const c = window.WC_COUNTRIES.find(x => x.code === code); return c ? c.flag : '⚪'; }
    function countryName(code){ const c = window.WC_COUNTRIES.find(x => x.code === code); return c ? c.name : '—'; }
    function fmtBobai(n){
      if (n == null) return '0';
      const v = Number(n);
      if (v >= 1_000_000) return (v/1_000_000).toFixed(2) + 'M';
      if (v >= 1_000)     return (v/1_000).toFixed(1) + 'K';
      return v.toFixed(0);
    }
    function fmtUsd(n){
      if (n == null || !isFinite(n)) return '$0.00';
      if (n >= 1_000_000) return '$' + (n/1_000_000).toFixed(2) + 'M';
      if (n >= 1_000)     return '$' + (n/1_000).toFixed(1) + 'K';
      return '$' + n.toFixed(2);
    }
    function fmtCryptoPrice(coin, n){
      if (n == null) return '—';
      const v = Number(n);
      if (coin === 'bobai') return '$' + v.toFixed(10).replace(/0+$/,'').replace(/\.$/,'');
      if (coin === 'btc')   return '$' + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return '$' + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    }
    function fmtPct(p){
      if (p == null || !isFinite(p)) return '—';
      if (p === 0) return '0%';
      if (p < 0.01) return '<0.01%';
      if (p < 0.1)  return p.toFixed(2) + '%';
      if (p < 10)   return p.toFixed(1)  + '%';
      return p.toFixed(0) + '%';
    }
    function fmtKickoffShort(iso){
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month:'short', day:'numeric' }) + ' · ' +
             d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
    }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]); }
    function coinDisplay(c){ return c === 'bobai' ? 'BOBAI' : c.toUpperCase(); }
    function coinIconPath(c){ const m = COINS.find(x => x.code === c); return m ? m.icon : ''; }

    // ============== PRIZE MATH ==============
    // End-pool: fixed tiered weights (50 / 25 / 15 / 10 %) for top 4 by total_points.
    // Skip+promote: non-linked players are skipped — the next wallet-linked player takes the
    // slot (e.g. if leaderboard #1 has no wallet, the wallet-linked #2 becomes payout #1).
    function computeEndPoolShares(rows){
      const shares = new Map();
      const eligible = rows.filter(isEligible);
      const top = eligible.slice(0, END_TOP_N);
      top.forEach((r, i) => {
        const tier = POOL_SPLIT.endTiers[i] || 0;
        shares.set(r.user_id, tier * pool.end);
      });
      return shares;
    }

    // Group pot: 55/30/15 across {top1, top2, best-3rd}. Per-player share = (fraction *
    // group_pot) / FIXED slots (12/12/8) — NOT divided by actually-filled slots. Empty
    // slots don't inflate the remaining players' projections; any unallocated share is
    // resolved at payout time within the SAME pot (cap-cascade first; if residual remains
    // after every winner is capped, leftover → permanent BOBAI/BNB liquidity + LP burn).
    // Keyed by `${user_id}|${letter}`.
    function computeGroupShares(allGroups){
      const shares = new Map();
      if (pool.group <= 0) return shares;
      const top1s = [], top2s = [], best3candidates = [];
      allGroups.forEach(g => {
        // Skip+promote within each group: drop non-linked players first, then pick top1/top2/best3.
        const r = g.rows.filter(isEligible);
        if (r[0]) top1s.push({ ...r[0], _letter: g.letter });
        if (r[1]) top2s.push({ ...r[1], _letter: g.letter });
        if (r[2]) best3candidates.push({ ...r[2], _letter: g.letter });
      });
      const best3 = best3candidates
        .sort((a,b) => (b.group_points||0) - (a.group_points||0))
        .slice(0, GROUP_SLOTS_BEST3);
      function distribute(bracket, fraction, slots){
        if (!bracket.length || slots <= 0) return;
        const each = (pool.group * fraction) / slots;
        bracket.forEach(r => shares.set(`${r.user_id}|${r._letter}`, each));
      }
      distribute(top1s, POOL_SPLIT.groupTop1,  GROUP_SLOTS_TOP1);
      distribute(top2s, POOL_SPLIT.groupTop2,  GROUP_SLOTS_TOP2);
      distribute(best3, POOL_SPLIT.groupBest3, GROUP_SLOTS_BEST3);
      return shares;
    }

    // Crypto: each coin pot ≈ 3.3% of total (= crypto_pot / 3); winner-take-all
    function computeCryptoWinnerShare(){ return pool.crypto / 3; }

    // ============== UI HELPERS ==============
    // contextPot: the pot this row is paid out of (end / group / crypto). The percentage
    // is the share of THAT pot — so Overall 1st reads 50% (of end pool), Crypto winner 33%
    // (of crypto pot), Group top1 ≈ 4.6% (of group pot, since 12 winners share the 55% bracket).
    function prizeCellHtml(bobai, contextPot){
      const pot = contextPot || 0;
      const pct = pot > 0 ? (bobai / pot * 100) : 0;
      const hasPrice = (pool.price || 0) > 0;
      const usdStr = !(bobai > 0) ? '$0' : (hasPrice ? fmtUsd(bobai * pool.price) : 'n/a');
      const isZero = !(bobai > 0);
      return `<div class="prize-cell ${isZero ? 'zero' : ''}">
        <div class="pz-pct">${isZero ? '—' : fmtPct(pct)}</div>
        <div class="pz-bobai">${isZero ? '0 BOBAI' : fmtBobai(bobai) + ' BOBAI'}</div>
        <div class="pz-usd">${usdStr}</div>
      </div>`;
    }

    function rowClass(rank, userId, extra){
      let c = 'row';
      if (rank === 1) c += ' top1';
      else if (rank === 2) c += ' top2';
      else if (rank === 3) c += ' top3';
      if (me && me.id === userId) c += ' me';
      if (extra) c += ' ' + extra;
      return c;
    }

    function rankLabel(rank){
      if (rank === 1) return '🥇';
      if (rank === 2) return '🥈';

    function userRow(r, rank, opts){
      const country = countryName(r.avatar_country);
      const ball = r.has_wallet ? '<span class="ball">⚽</span>' : '';
      const href = './user.html?u=' + encodeURIComponent(r.username);

        ? window.WC_AVATAR.avatarHtml(r.avatar_country, 'sm')

      const prize = (opts.prizeBobai != null)
        ? prizeCellHtml(opts.prizeBobai, opts.contextPot)
        : `<div class="prize-cell zero"><div class="pz-pct">—</div><div class="pz-bobai">0 BOBAI</div><div class="pz-usd">$0</div></div>`;
      const ptsLabel = opts.ptsLabel ? `<span class="lbl">${opts.ptsLabel}</span>` : '';
      const pts = `<div class="pts ${opts.ptsClass || ''}">${opts.ptsValue}${ptsLabel}</div>`;
      return `<a href="${href}" class="${rowClass(rank, r.user_id, opts.extraClass)}" style="text-decoration:none;color:inherit">

    function meFooterHtml({ rank, totalRows, qualifierRank, qualifierPts, myPts, qualifiedCopy, needCopy }){
      if (!me) {
        return `<div class="me-footer"><div class="mf-left"><span class="mf-status">Sign in to see your own rank here.</span></div></div>`;
      }
      if (rank == null) {
        return `<div class="me-footer"><div class="mf-left"><span class="mf-status">You don't have entries in this view yet.</span></div></div>`;
      }
      const qualified = rank <= qualifierRank;
      const need = Math.max(1, (qualifierPts || 0) - (myPts || 0) + 1);
      const statusHtml = qualified
        ? `<span class="mf-status qualified">${qualifiedCopy}</span>`
        : `<span class="mf-status need">${needCopy.replace('{n}', need)}</span>`;

    // ============== POOL ==============

        group:  parseFloat(p.group_pot)       || 0,

    // ============== MATCHES + FIFA STANDINGS ==============
    async function loadAllMatches(){
      if (allMatches) return allMatches;

      allMatches = r.matches || [];

    function computeStandings(matches, groupLetter){
      const teams = {};
      const gm = matches.filter(m => m.phase === 'group' && m.group_letter === groupLetter);
      gm.forEach(m => {
        [m.team_home, m.team_away].forEach(t => {
          if (t && t !== 'TBD' && !teams[t]) teams[t] = { code:t, P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0 };
        });
        if (!m.played || m.goals_home == null || m.goals_away == null) return;
        const H = teams[m.team_home], A = teams[m.team_away];
        if (!H || !A) return;
        H.P++; A.P++;
        H.GF += m.goals_home; H.GA += m.goals_away;
        A.GF += m.goals_away; A.GA += m.goals_home;
        H.GD = H.GF - H.GA; A.GD = A.GF - A.GA;
        if (m.goals_home > m.goals_away)      { H.W++; H.Pts += 3; A.L++; }
        else if (m.goals_home < m.goals_away) { A.W++; A.Pts += 3; H.L++; }
        else                                  { H.D++; A.D++; H.Pts++; A.Pts++; }
      });
      return Object.values(teams).sort((a,b) =>
        b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF || a.code.localeCompare(b.code)
      );
    }

    function renderStandingsTable(rows, letter){
      if (!rows.length) return `<div class="empty">Group ${letter} teams not seeded yet.</div>`;
      const head = `<tr><th class="pos">#</th><th class="team-cell" style="text-align:left">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF:GA</th><th>GD</th><th>Pts</th></tr>`;
      const body = rows.map((t, i) => {
        const rank = i + 1;
        const cls = rank <= 2 ? 'q'+rank : (rank === 3 ? 'q3' : '');
        const gdCls = t.GD > 0 ? 'gd-pos' : (t.GD < 0 ? 'gd-neg' : '');
        const gdTxt = t.GD > 0 ? '+'+t.GD : t.GD;
        return `<tr class="${cls}"><td class="pos">${rank}</td>
          <td><div class="team-cell"><span class="fl">${countryFlag(t.code)}</span><span class="nm">${countryName(t.code)}</span></div></td>
          <td>${t.P}</td><td>${t.W}</td><td>${t.D}</td><td>${t.L}</td><td>${t.GF}:${t.GA}</td>
          <td class="${gdCls}">${gdTxt}</td><td class="pts">${t.Pts}</td></tr>`;
      }).join('');
      return `<div class="standings"><table><thead>${head}</thead><tbody>${body}</tbody></table>
        <div class="q-note">Top 2 advance to Round of 32. Best 3rd-placed teams may also qualify per FIFA seeding rules.</div></div>`;
    }

    async function renderOverall(){

      // Shares are computed from the unfiltered set (skip+promote handled inside computeEndPoolShares),
      // so a non-linked leader still doesn't get a share even with the toggle off. The toggle only

      const shares = computeEndPoolShares(r.rows);

      if (!rows.length) { $('#list').innerHTML = '<div class="empty">No wallet-linked players yet — toggle "All players" to see the full leaderboard.</div>'; return; }
      const html = rows.map((row, i) => userRow(row, i+1, {

      $('#list').innerHTML = standingsHtml + playerSection + playerListHtml + footer;
      if (window.twemoji) try { window.twemoji.parse($('#list'), { folder:'svg', ext:'.svg', base:'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/' }); } catch(e){}

    // ============== BRACKET ==============
    function brTeam(code, align){

    async function renderCrypto(coin){
      $('#list').innerHTML = '<div class="empty">Loading…</div>';
      const [r, matches] = await Promise.all([ window.WC_PROFILE.loadCryptoLeaderboard(coin), loadAllMatches(), refreshLivePrices() ]);
      if (r.error) { $('#list').innerHTML = `<div class="empty">${r.error}</div>`; return; }
      if (!r.rows.length) { $('#list').innerHTML = '<div class="empty">No predictions yet.</div>'; return; }

      const priceKey = coin + '_price';
      const livePx = livePrices[coin];
      const display = coinDisplay(coin);

      // Reveal crypto tips publicly at first-match kickoff (match id=1), same gate as profile page.
      const firstMatch = (matches || []).find(m => m.id === 1);
      const firstKickoffMs = firstMatch ? new Date(firstMatch.kickoff_utc).getTime() : null;
      const cryptoRevealed = firstKickoffMs != null && Date.now() >= firstKickoffMs;

      // Sort all by tip price ASC (apply wallet-only filter first if toggle is on — ranks
      // and the "closest" highlight then re-number against the linked-only set).
      const all = applyWalletFilter(r.rows
        .filter(row => row[priceKey] != null)
        .map(row => ({ ...row, _tip: parseFloat(row[priceKey]) }))
        .filter(row => isFinite(row._tip)))
        .sort((a,b) => a._tip - b._tip);

      if (!all.length) { $('#list').innerHTML = `<div class="empty">${walletOnly ? 'No wallet-linked ' + display + ' predictions yet — toggle "All players" to see all.' : 'No valid ' + display + ' predictions yet.'}</div>`; return; }

      // Skip+promote: the actual payout winner is the closest player WITH A LINKED WALLET.
      // When the toggle is off we still highlight the absolute closest visually (because the
      // leaderboard rank reflects the real game state), but the prize cell is attributed to
      // the eligible winner. When the toggle is on, `all` is already wallet-only so both
      // collapse to the same row.
      let closestIdx = 0;
      if (livePx != null && isFinite(livePx)) {
        let bestDiff = Infinity;
        all.forEach((row, i) => {
          const d = Math.abs(row._tip - livePx);
          if (d < bestDiff) { bestDiff = d; closestIdx = i; }
        });
      }
      // Payout winner = closest eligible (skip+promote)
      let payoutWinnerId = null;
      const eligibleAll = all.filter(isEligible);
      if (eligibleAll.length) {
        if (livePx != null && isFinite(livePx)) {
          let bestDiff = Infinity;
          eligibleAll.forEach(row => {
            const d = Math.abs(row._tip - livePx);
            if (d < bestDiff) { bestDiff = d; payoutWinnerId = row.user_id; }
          });
        } else {
          payoutWinnerId = eligibleAll[0].user_id;
        }
      }
      // Rank by absolute distance to live (closest = #1)
      const rankByUserId = new Map();
      if (livePx != null && isFinite(livePx)) {
        all.map((row, i) => ({ row, dist: Math.abs(row._tip - livePx) }))
           .sort((a,b) => a.dist - b.dist)
           .forEach((x, rank) => rankByUserId.set(x.row.user_id, rank + 1));
      } else {
        all.forEach((row, i) => rankByUserId.set(row.user_id, i + 1));
      }

      const above = all.slice(closestIdx + 1, closestIdx + 4); // higher tips
      const below = all.slice(Math.max(0, closestIdx - 3), closestIdx); // lower tips
      const aboveDisplay = above.slice().reverse(); // highest tip first (top of display)
      const belowDisplay = below.slice().reverse(); // closest-of-below first (just under closest)
      const winnerPrize = computeCryptoWinnerShare();
      const closestRow = all[closestIdx];

      function buildRow(row, isClosest){
        const rank = rankByUserId.get(row.user_id) || '—';
        const isMe = !!(me && row.user_id === me.id);
        const reveal = cryptoRevealed || isMe;
        let ptsValue;
        if (reveal) {
          const diff = (livePx != null) ? Math.abs(row._tip - livePx) : null;
          const tipPx = fmtCryptoPrice(coin, row._tip);
          const diffHtml = diff != null
            ? `<br><span style="font-size:10px;color:${isClosest?'var(--gold)':'var(--muted)'};font-weight:${isClosest?700:500}">Δ ${fmtCryptoPrice(coin, diff)}</span>`
            : `<br><span style="font-size:10px;color:var(--muted)">no live</span>`;
          ptsValue = tipPx + diffHtml;
        } else {
          ptsValue = `<span style="color:var(--muted)">🔒</span><br><span style="font-size:10px;color:var(--muted)">locked</span>`;
        }
        // Prize % (33% of crypto pot) is public — derives from rank, which is also public.
        // Only the actual tip price stays hidden until first-match kickoff.
        return userRow(row, rank, {
          ptsLabel: '',
          ptsValue,
          ptsClass: 'diff',
          prizeBobai: (row.user_id === payoutWinnerId) ? winnerPrize : 0,
          contextPot: pool.crypto,
          extraClass: isClosest ? 'closest' : '',
        });
      }

      const coinImg = `<img class="coin-badge ${coin}" src="${coinIconPath(coin)}" alt="">`;
      const liveBadge = livePx != null
        ? `<div style="text-align:center;padding:10px;background:rgba(0,230,118,.04);border:1px solid rgba(0,230,118,.2);border-radius:8px;margin-bottom:14px;font-size:12px;color:#5fffa0">${coinImg}Live ${display}: <b>${fmtCryptoPrice(coin, livePx)}</b> · winner-take-all on the closest guess at Final kickoff</div>`
        : `<div style="text-align:center;padding:10px;background:rgba(255,180,0,.04);border:1px solid rgba(255,180,0,.2);border-radius:8px;margin-bottom:14px;font-size:12px;color:#ffc066">${coinImg}Live ${display} price unavailable — showing predictions only</div>`;

      const aboveSection = aboveDisplay.length
        ? `<div class="crypto-divider up">▲ ${display} wins if price rises</div>` +
          aboveDisplay.map(row => buildRow(row, false)).join('')
        : '';
      const closestHtml = buildRow(closestRow, true);
      const belowSection = belowDisplay.length
        ? belowDisplay.map(row => buildRow(row, false)).join('') +
          `<div class="crypto-divider down">▼ ${display} wins if price falls</div>`
        : '';

      // "Me" handling: if not in the shown set, append separately
      const shownIds = new Set([closestRow.user_id, ...aboveDisplay.map(r0=>r0.user_id), ...belowDisplay.map(r0=>r0.user_id)]);
      const meRowData = me ? all.find(r0 => r0.user_id === me.id) : null;
      const meExtraHtml = (me && meRowData && !shownIds.has(me.id))
        ? `<div class="rank-gap">···</div>` + buildRow(meRowData, false)
        : '';

      // Footer
      let footer = '';
      if (me) {
        if (meRowData) {
          const meRank = rankByUserId.get(meRowData.user_id);
          // To flip to #1, live price must cross the midpoint between my tip and the leader's tip
          // (since leader is currently closer, midpoint lies on "my" side of live price).
          let flipMoveAbs = null;
          let flipDirVerb = null; // 'rise' | 'fall'
          if (livePx != null && isFinite(livePx) && meRowData._tip !== closestRow._tip) {
            const midpoint = (meRowData._tip + closestRow._tip) / 2;
            const moveSigned = midpoint - livePx;
            flipMoveAbs = Math.abs(moveSigned);
            flipDirVerb = moveSigned >= 0 ? 'rise' : 'fall';
          }
          const status = meRank === 1
            ? `<span class="mf-status qualified">✓ Currently closest — would win the ${display} pot</span>`
            : (flipMoveAbs != null
                ? `<span class="mf-status need">${display} needs to ${flipDirVerb} ${fmtCryptoPrice(coin, flipMoveAbs)} to flip #1</span>`
                : `<span class="mf-status">live price unavailable</span>`);
          footer = `<div class="me-footer">
            <div class="mf-left"><span class="mf-rank">#${meRank}</span><span class="mf-status">of ${all.length} prediction${all.length===1?'':'s'}</span></div>
            <div>${status}</div></div>`;
        } else {
          footer = `<div class="me-footer"><div class="mf-left"><span class="mf-status">You haven't set a ${display} prediction yet.</span></div></div>`;
        }
      }

      $('#list').innerHTML = liveBadge + aboveSection + closestHtml + belowSection + meExtraHtml + footer;
    }

    // ============== SUB-SELECTORS ==============
    function showGroupSelector(){
      const sel = $('#sub-selector');
      sel.classList.remove('hidden');
      sel.innerHTML = GROUP_LETTERS.map(L =>
        `<button data-letter="${L}" class="${subView===L?'active':''}">Group ${L}</button>`
      ).join('');
      $$('#sub-selector button').forEach(b => b.addEventListener('click', () => {
        subView = b.dataset.letter; showGroupSelector(); renderGroup(subView);
      }));
    }
    function showPhaseSelector(){
      const sel = $('#sub-selector');
      sel.classList.remove('hidden');
      sel.innerHTML = KO_PHASES.map(p =>
        `<button data-phase="${p.key}" class="${subView===p.key?'active':''}">${p.label}</button>`
      ).join('');
      $$('#sub-selector button').forEach(b => b.addEventListener('click', () => {
        subView = b.dataset.phase; showPhaseSelector(); renderBracket();
      }));
    }
    function showCoinSelector(){
      const sel = $('#sub-selector');
      sel.classList.remove('hidden');
      sel.innerHTML = COINS.map(c =>
        `<button data-coin="${c.code}" class="${subView===c.code?'active':''}"><img class="coin-ic ${c.code}" src="${c.icon}" alt="">${c.label}</button>`
      ).join('');
      $$('#sub-selector button').forEach(b => b.addEventListener('click', () => {
        subView = b.dataset.coin; showCoinSelector(); renderCrypto(subView);
      }));
    }

    function switchView(v){
      view = v;
      $$('#lbar button').forEach(b => b.classList.toggle('active', b.dataset.view === v));
      if (v === 'overall') {
        subView = null; $('#sub-selector').classList.add('hidden'); renderOverall();
      } else if (v === 'groups') {
        if (!subView || !GROUP_LETTERS.includes(subView)) subView = 'A';
        showGroupSelector(); renderGroup(subView);
      } else if (v === 'bracket') {
        if (!subView || !KO_PHASES.find(p => p.key === subView)) subView = 'r32';
        showPhaseSelector(); renderBracket();
      } else {
        if (!subView || !['btc','bnb','bobai'].includes(subView)) subView = 'btc';
        showCoinSelector(); renderCrypto(subView);
      }
    }

    $$('#lbar button').forEach(b => b.addEventListener('click', () => switchView(b.dataset.view)));

    // Wallet-only toggle — sync initial UI, then re-render current view on each click.
    function syncWalletFilterButtons(){
      $$('#wallet-filter button').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === (walletOnly ? 'wallet' : 'all'))
      );
    }
    syncWalletFilterButtons();
    $$('#wallet-filter button').forEach(b => b.addEventListener('click', () => {
      const next = b.dataset.filter === 'wallet';
      if (next === walletOnly) return;
      walletOnly = next;
      try { localStorage.setItem('wc_wallet_filter', walletOnly ? '1' : '0'); } catch(e){}
      syncWalletFilterButtons();
      switchView(view); // preserves subView for groups/bracket/crypto
    }));

    (async ()=>{
      me = await window.WC_AUTH.currentProfile();
      if (!me) { window.location.href = '/worldcup/'; return; }
      await loadPool();
      switchView('overall');
      setInterval(loadPool, 30000);
    })();
  </script>
</body>
</html>
